name: Windows Agents Release (Nightly)

on:
  schedule:
    # schedule build every night
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows-agents-nightly-release:
    name: Build and publish nightly Windows agents
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
      windows-only: true
      include-windows-sciter: false
